# Seed collections for Skemman crawling.
# Handles are intentionally stored without a URL prefix.
# The crawler will use https://skemman.is/handle/<handle>

base_url: "https://skemman.is"
user_agent: "skemman-scraper/0.1 research crawler; contact: replace-with-email@example.com"
request_delay_seconds: 2.0
timeout_seconds: 30
cache_html: true
download_pdfs: false
year_min: null
year_max: null

institutions:
  - name: "Háskóli Íslands"
    short_name: "HI"
    enabled: true
    seed_handles:
      - "1946/2064"
    target_labels:
      - "B.S. verkefni - Verkfræði- og náttúruvísindasvið"
      - "Doktorsritgerðir - Verkfræði- og náttúruvísindasvið"
      - "Meistaraprófsritgerðir - Verkfræði- og náttúruvísindasvið"

  - name: "Háskólinn í Reykjavík"
    short_name: "HR"
    enabled: true
    seed_handles:
      - "1946/6870"
    target_labels:
      - "BSc Tæknifræðideild / Department of Applied Engineering"
